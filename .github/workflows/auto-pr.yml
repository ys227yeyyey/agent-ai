name: Issue to PR (Codex)

on:
  issues:
    types: [opened]

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ▼ Issueの内容を取得
      - name: Read Issue
        run: |
          echo "TITLE=${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "BODY=${{ github.event.issue.body }}" >> $GITHUB_ENV

      # ▼ CodexでLP生成（ここが本体）
      - name: Generate LP with Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cat <<EOF > prompt.txt
          LPを作成してください。

          タイトル: $TITLE
          要件: $BODY

          出力はHTMLのみ。index.htmlとして完成形を出力してください。
          EOF

          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-5-codex",
              "input": "'"$(cat prompt.txt | sed 's/"/\\"/g')"'" 
            }' \
            | jq -r '.output[0].content[0].text' > index.html

      # ▼ Git設定
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      # ▼ ブランチ作成
      - name: Create branch
        run: |
          BRANCH=auto-lp-${{ github.event.issue.number }}
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      # ▼ commit & push
      - name: Commit & Push
        run: |
          git add index.html
          git commit -m "Generate LP from issue #${{ github.event.issue.number }}"
          git push origin $BRANCH

      # ▼ PR作成
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.BRANCH }}
          title: "Auto LP from issue #${{ github.event.issue.number }}"
          body: "Generated by Codex from issue"
