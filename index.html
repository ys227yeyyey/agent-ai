<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accenture PRページ</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: linear-gradient(135deg, #230046, #5a1aa8);
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(680px, 90vw);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: 0.02em;
    }

    p {
      line-height: 1.8;
      margin: 10px 0;
    }

    .cta {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      text-decoration: none;
      color: #230046;
      background: #fff;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    small {
      display: block;
      margin-top: 16px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>未来を、もっと速く。</h1>
    <p><strong>Accenture</strong> は、戦略・テクノロジー・クリエイティブを掛け合わせ、
      企業の変革を加速させるグローバルパートナーです。</p>
    <p>デジタル、クラウド、AIの力で、
      「いま必要な成果」と「これからの成長」を同時に実現します。</p>

    <a class="cta" href="https://www.accenture.com/jp-ja" target="_blank" rel="noopener noreferrer">
      公式サイトを見る
    </a>

    <small>※ 本ページはデモとして作成したシンプルなPRページです。</small>
  </main>
</body>
</html>
