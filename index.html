<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドイツの素晴らしさ</title>
  <style>
    :root {
      --black: #111;
      --red: #d81e05;
      --gold: #ffce00;
      --bg: #f6f7fb;
      --text: #1f2937;
    }

    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(160deg, var(--bg), #ffffff);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .flag {
      height: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }

    .flag div:nth-child(1) { background: var(--black); }
    .flag div:nth-child(2) { background: var(--red); }
    .flag div:nth-child(3) { background: var(--gold); }

    .content {
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 4vw, 2.3rem);
    }

    p {
      margin: 8px 0;
      line-height: 1.8;
    }

    ul {
      margin: 14px 0 0;
      padding-left: 20px;
      line-height: 1.9;
    }

    li::marker {
      color: var(--red);
    }

    .note {
      margin-top: 18px;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="flag" aria-hidden="true">
      <div></div><div></div><div></div>
    </div>
    <section class="content">
      <h1>ドイツの素晴らしさ 🇩🇪</h1>
      <p>ドイツは、歴史・技術・自然・文化が高いレベルで調和した魅力的な国です。</p>
      <ul>
        <li><strong>高い技術力：</strong>自動車や機械工学など、世界をリードするものづくり。</li>
        <li><strong>美しい街並み：</strong>ベルリン、ミュンヘン、ハイデルベルクなど個性豊かな都市。</li>
        <li><strong>豊かな自然：</strong>黒い森やアルプス周辺など、四季を感じる絶景スポット。</li>
        <li><strong>食文化：</strong>ソーセージ、プレッツェル、ビールなど地域ごとの味わいが豊富。</li>
        <li><strong>学術と芸術：</strong>哲学・音楽・科学で世界に大きな影響を与えてきた伝統。</li>
      </ul>
      <p class="note">シンプルに「ドイツの良さ」を紹介するためのサンプルHTMLページです。</p>
    </section>
  </main>
</body>
</html>
